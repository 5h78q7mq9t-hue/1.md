vrrp_script check_web {
    script "/etc/keepalived/check.sh"
    interval 3
    fall 2
    rise 2
    user root
}

vrrp_instance VI_1 {
    state MASTER
    interface enp0s1
    virtual_router_id 51
    priority 100
    advert_int 1

    virtual_ipaddress {
        192.168.64.100
    }

    track_script {
        check_web
    }
}
